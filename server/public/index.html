<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片上传管理 | 星依旧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 上传区域 */
        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            color: #667eea;
        }

        .upload-area p {
            margin: 8px 0;
            color: #666;
        }

        .upload-area .drag-hint {
            font-size: 14px;
            color: #999;
            margin-top: 12px;
        }

        #fileInput {
            display: none;
        }

        /* 表单字段 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 按钮 */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            flex: none;
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        /* 预览 */
        .preview {
            margin-top: 20px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 6px;
            display: block;
            margin-bottom: 12px;
        }

        /* 消息提示 */
        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 图片列表 */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .image-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .image-card:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .image-card-thumb {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .image-card-info {
            padding: 12px;
        }

        .image-card-name {
            font-weight: 600;
            color: #333;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .image-card-alt {
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .image-card-actions {
            display: flex;
            gap: 6px;
        }

        .image-card-actions button {
            flex: 1;
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 加载状态 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 照片上传管理</h1>
            <p>为你的摄影作品集添加新照片</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="upload">上传照片</button>
            <button class="tab-btn" data-tab="manage">管理照片</button>
        </div>

        <!-- 上传标签 -->
        <div class="tab-content active" id="tab-upload">
            <div id="uploadMessage" class="message"></div>

            <div class="upload-area" id="uploadArea">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p><strong>拖拽图片到此</strong>或点击选择</p>
                <p class="drag-hint">支持 JPG, PNG, WebP, GIF, HEIC</p>
            </div>

            <input type="file" id="fileInput" accept="image/*">

            <div id="preview" class="preview" style="display: none;">
                <img id="previewImage" class="preview-image" alt="预览">
            </div>

            <div class="form-group">
                <label for="imageAlt">图片说明 (可选)</label>
                <textarea id="imageAlt" placeholder="输入图片的说明或描述..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="imagePosition">背景位置 (可选)</label>
                    <input type="text" id="imagePosition" placeholder="center center" value="center center">
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="uploadBtn" disabled>
                    <span class="loading" style="display: none;"></span>
                    上传并生成缩略图
                </button>
                <button class="btn-secondary" id="resetBtn">重置</button>
            </div>
        </div>

        <!-- 管理标签 -->
        <div class="tab-content" id="tab-manage">
            <div id="manageMessage" class="message"></div>
            <div id="imagesList" class="images-grid"></div>
        </div>
    </div>

    <script>
        // 动态确定 API 基础路径
        // 支持通过 Nginx 反向代理访问 /starstill/manage
        function getApiBase() {
            const path = window.location.pathname;
            const match = path.match(/^(.*?\/manage)(?:\/|$)/);
            if (match) {
                return match[1] + '/api';
            }
            return '/api';
        }
        
        const API_BASE = getApiBase();
        let selectedFile = null;
        let imageBaseUrl = '/starstill/img';  // 默认图片基础 URL

        // 获取配置（包括图片基础 URL）
        async function loadConfig() {
            try {
                const response = await fetch(`${API_BASE}/config`, { credentials: 'same-origin' });
                if (response.ok) {
                    const config = await response.json();
                    imageBaseUrl = config.imageBaseUrl || imageBaseUrl;
                }
            } catch (error) {
                console.warn('Failed to load config:', error);
            }
        }

        // API 请求助手
        async function apiRequest(method, endpoint, data = null, isFormData = false) {
            const options = {
                method,
                headers: {},
                credentials: 'same-origin'
            };

            if (data) {
                if (isFormData) {
                    options.body = data;
                } else {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(data);
                }
            }

            const response = await fetch(`${API_BASE}${endpoint}`, options);
            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error || `API error: ${response.status}`);
            }

            return result;
        }

        // 显示消息
        function showMessage(elementId, message, type = 'info') {
            const messageEl = document.getElementById(elementId);
            messageEl.textContent = message;
            messageEl.className = `message show ${type}`;

            if (type !== 'error') {
                setTimeout(() => {
                    messageEl.classList.remove('show');
                }, 5000);
            }
        }

        // 上传区域事件
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        function handleFileSelect(file) {
            if (!file || !file.type.startsWith('image/')) {
                showMessage('uploadMessage', '请选择有效的图片文件', 'error');
                return;
            }

            selectedFile = file;
            document.getElementById('uploadBtn').disabled = false;

            // 显示预览
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('preview');
                const img = document.getElementById('previewImage');
                img.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 上传按钮
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            if (!selectedFile) {
                showMessage('uploadMessage', '请先选择图片', 'error');
                return;
            }

            const btn = document.getElementById('uploadBtn');
            const loading = btn.querySelector('.loading');
            btn.disabled = true;
            loading.style.display = 'inline-block';

            try {
                const formData = new FormData();
                formData.append('image', selectedFile);
                formData.append('alt', document.getElementById('imageAlt').value);
                formData.append('position', document.getElementById('imagePosition').value);

                const result = await apiRequest('POST', '/upload', formData, true);

                showMessage('uploadMessage', '✅ 上传成功！缩略图已自动生成', 'success');
                resetForm();
                loadImages();
            } catch (error) {
                showMessage('uploadMessage', `❌ 上传失败: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // 重置按钮
        document.getElementById('resetBtn').addEventListener('click', resetForm);

        function resetForm() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('imageAlt').value = '';
            document.getElementById('imagePosition').value = 'center center';
            document.getElementById('uploadBtn').disabled = true;
        }

        // 标签切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                e.target.classList.add('active');
                const tabId = `tab-${e.target.dataset.tab}`;
                document.getElementById(tabId).classList.add('active');

                if (e.target.dataset.tab === 'manage') {
                    loadImages();
                }
            });
        });

        // 加载并显示图片列表
        async function loadImages() {
            try {
                const result = await apiRequest('GET', '/images');
                const imagesList = document.getElementById('imagesList');
                imagesList.innerHTML = '';

                const images = result.images || [];

                if (images.length === 0) {
                    imagesList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; padding: 40px 0;">还没有照片，快去上传第一张吧！</p>';
                    return;
                }

                images.forEach((image) => {
                    const thumbUrl = `${imageBaseUrl}/${image.thumb}`;
                    const filename = image.src.split('/').pop();

                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <img src="${thumbUrl}" alt="${image.alt}" class="image-card-thumb" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E'">
                        <div class="image-card-info">
                            <div class="image-card-name">${filename}</div>
                            <div class="image-card-alt">${image.alt || '(无说明)'}</div>
                            <div class="image-card-actions">
                                <button class="btn-secondary" onclick="copyFilename('${filename}')">复制</button>
                                <button class="btn-danger" onclick="deleteImage('${filename}')">删除</button>
                            </div>
                        </div>
                    `;
                    imagesList.appendChild(card);
                });
            } catch (error) {
                showMessage('manageMessage', `❌ 加载失败: ${error.message}`, 'error');
            }
        }

        function copyFilename(filename) {
            navigator.clipboard.writeText(filename);
            alert('已复制: ' + filename);
        }

        async function deleteImage(filename) {
            if (!confirm(`确定删除 ${filename} 吗？此操作不可撤销。`)) return;

            try {
                await apiRequest('DELETE', `/images/${filename}`);
                showMessage('manageMessage', '✅ 删除成功', 'success');
                loadImages();
            } catch (error) {
                showMessage('manageMessage', `❌ 删除失败: ${error.message}`, 'error');
            }
        }

        // 初始化
        window.addEventListener('load', () => {
            loadConfig();
        });
    </script>
</body>
</html>
