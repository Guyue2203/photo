<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片上传管理 | 星依旧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
            --bg: #f6f5f2;
            --panel: #ffffff;
            --panel-soft: #faf9f7;
            --text: #1f2328;
            --muted: #6f747b;
            --line: #dedbd3;
            --line-strong: #c8c2b8;
            --accent: #2f6f68;
            --accent-strong: #255952;
            --danger: #b24b42;
            --danger-soft: #f8e7e4;
            --radius: 8px;
        }

        body {
            font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0)),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 44px 24px 56px;
        }

        .container {
            max-width: 980px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 22px;
        }

        .header h1 {
            color: var(--text);
            font-size: 24px;
            font-weight: 650;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--muted);
            font-size: 14px;
        }

        .tabs {
            align-items: center;
            background: #ebe8e1;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            display: flex;
            gap: 3px;
            margin-bottom: 18px;
            padding: 3px;
            width: max-content;
        }

        .tab-btn {
            background: transparent;
            border: 0;
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            font-weight: 560;
            min-width: 96px;
            padding: 9px 14px;
            transition: background-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
        }

        .tab-btn.active {
            background: var(--panel);
            box-shadow: 0 1px 2px rgba(31, 35, 40, 0.08);
            color: var(--text);
        }

        .tab-content {
            display: none;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 18px 50px rgba(31, 35, 40, 0.07);
            padding: 24px;
        }

        .tab-content.active {
            display: block;
        }

        /* 上传区域 */
        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 1px dashed var(--line-strong);
            border-radius: var(--radius);
            padding: 44px 28px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.18s ease, background-color 0.18s ease;
            background: var(--panel-soft);
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: #f7faf8;
        }

        .upload-area.dragover {
            border-color: var(--accent);
            background: #f1f7f5;
        }

        .upload-area svg {
            width: 42px;
            height: 42px;
            margin-bottom: 14px;
            color: var(--accent);
        }

        .upload-area p {
            margin: 6px 0;
            color: var(--muted);
            font-size: 14px;
        }

        .upload-area strong {
            color: var(--text);
            font-weight: 620;
        }

        .upload-area .drag-hint {
            font-size: 13px;
            color: #8b8f95;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        /* 表单字段 */
        .form-group {
            margin-top: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 580;
            color: var(--text);
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 7px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: var(--panel);
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(47, 111, 104, 0.12);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 92px;
        }

        /* 按钮 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        button {
            flex: 1;
            padding: 11px 18px;
            border: 1px solid transparent;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 620;
            cursor: pointer;
            transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, opacity 0.18s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-strong);
        }

        .btn-primary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--panel);
            border-color: var(--line);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--line-strong);
            background: var(--panel-soft);
        }

        .btn-danger {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: #efc4be;
            flex: none;
            padding: 7px 12px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #f4d8d4;
        }

        /* 预览 */
        .preview {
            margin-top: 16px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 360px;
            border-radius: var(--radius);
            display: block;
            margin-bottom: 2px;
            border: 1px solid var(--line);
        }

        /* 消息提示 */
        .message {
            padding: 10px 12px;
            border-radius: 7px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #e7f2ed;
            color: #235d4e;
            border: 1px solid #c9e1d5;
        }

        .message.error {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid #efc4be;
        }

        .message.info {
            background: #edf1f5;
            color: #405366;
            border: 1px solid #d7dde4;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 图片列表 */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .image-card {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--panel);
            transition: border-color 0.18s ease, transform 0.18s ease;
        }

        .image-card:hover {
            border-color: var(--line-strong);
            transform: translateY(-1px);
        }

        .image-card-thumb {
            width: 100%;
            aspect-ratio: 4 / 3;
            height: auto;
            object-fit: cover;
            background: #ece9e2;
            display: block;
        }

        .image-card-info {
            padding: 11px;
        }

        .image-card-name {
            font-weight: 620;
            color: var(--text);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }

        .image-card-alt {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .image-card-actions {
            display: flex;
            gap: 6px;
        }

        .image-card-actions button {
            flex: 1;
            padding: 7px 10px;
            font-size: 12px;
        }

        /* 加载状态 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 700px) {
            body {
                padding: 22px 14px 36px;
            }

            .header {
                display: block;
            }

            .tabs {
                width: 100%;
            }

            .tab-btn {
                min-width: 0;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            }

            .tab-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>照片管理</h1>
            <p>星依旧摄影作品集</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="upload">上传照片</button>
            <button class="tab-btn" data-tab="manage">管理照片</button>
        </div>

        <!-- 上传标签 -->
        <div class="tab-content active" id="tab-upload">
            <div id="uploadMessage" class="message"></div>

            <div class="upload-area" id="uploadArea">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p><strong>拖拽图片到此</strong> 或点击选择</p>
                <p class="drag-hint">支持 JPG, PNG, WebP, GIF, HEIC</p>
            </div>

            <input type="file" id="fileInput" accept="image/*">

            <div id="preview" class="preview" style="display: none;">
                <img id="previewImage" class="preview-image" alt="预览">
            </div>

            <div class="form-group">
                <label for="imageAlt">图片说明</label>
                <textarea id="imageAlt" placeholder="可选"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="imagePosition">构图位置</label>
                    <input type="text" id="imagePosition" placeholder="center center" value="center center">
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="uploadBtn" disabled>
                    <span class="loading" style="display: none;"></span>
                    上传
                </button>
                <button class="btn-secondary" id="resetBtn">重置</button>
            </div>
        </div>

        <!-- 管理标签 -->
        <div class="tab-content" id="tab-manage">
            <div id="manageMessage" class="message"></div>
            <div id="imagesList" class="images-grid"></div>
        </div>
    </div>

    <script>
        // 动态确定 API 基础路径
        // 支持通过 Nginx 反向代理访问 /starstill/manage
        function getApiBase() {
            const path = window.location.pathname;
            const match = path.match(/^(.*?\/manage)(?:\/|$)/);
            if (match) {
                return match[1] + '/api';
            }
            return '/api';
        }
        
        const API_BASE = getApiBase();
        let selectedFile = null;
        let imageBaseUrl = '/starstill/img';  // 默认图片基础 URL

        // 获取配置（包括图片基础 URL）
        async function loadConfig() {
            try {
                const response = await fetch(`${API_BASE}/config`, { credentials: 'same-origin' });
                if (response.ok) {
                    const config = await response.json();
                    imageBaseUrl = config.imageBaseUrl || imageBaseUrl;
                }
            } catch (error) {
                console.warn('Failed to load config:', error);
            }
        }

        // API 请求助手
        async function apiRequest(method, endpoint, data = null, isFormData = false) {
            const options = {
                method,
                headers: {},
                credentials: 'same-origin'
            };

            if (data) {
                if (isFormData) {
                    options.body = data;
                } else {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(data);
                }
            }

            const response = await fetch(`${API_BASE}${endpoint}`, options);
            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error || `API error: ${response.status}`);
            }

            return result;
        }

        // 显示消息
        function showMessage(elementId, message, type = 'info') {
            const messageEl = document.getElementById(elementId);
            messageEl.textContent = message;
            messageEl.className = `message show ${type}`;

            if (type !== 'error') {
                setTimeout(() => {
                    messageEl.classList.remove('show');
                }, 5000);
            }
        }

        // 上传区域事件
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        function handleFileSelect(file) {
            if (!file || !file.type.startsWith('image/')) {
                showMessage('uploadMessage', '请选择有效的图片文件', 'error');
                return;
            }

            selectedFile = file;
            document.getElementById('uploadBtn').disabled = false;

            // 显示预览
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('preview');
                const img = document.getElementById('previewImage');
                img.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 上传按钮
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            if (!selectedFile) {
                showMessage('uploadMessage', '请先选择图片', 'error');
                return;
            }

            const btn = document.getElementById('uploadBtn');
            const loading = btn.querySelector('.loading');
            btn.disabled = true;
            loading.style.display = 'inline-block';

            try {
                const formData = new FormData();
                formData.append('image', selectedFile);
                formData.append('alt', document.getElementById('imageAlt').value);
                formData.append('position', document.getElementById('imagePosition').value);

                const result = await apiRequest('POST', '/upload', formData, true);

                showMessage('uploadMessage', '上传成功，缩略图已生成。', 'success');
                resetForm();
                loadImages();
            } catch (error) {
                showMessage('uploadMessage', `上传失败：${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // 重置按钮
        document.getElementById('resetBtn').addEventListener('click', resetForm);

        function resetForm() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('imageAlt').value = '';
            document.getElementById('imagePosition').value = 'center center';
            document.getElementById('uploadBtn').disabled = true;
        }

        // 标签切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                e.target.classList.add('active');
                const tabId = `tab-${e.target.dataset.tab}`;
                document.getElementById(tabId).classList.add('active');

                if (e.target.dataset.tab === 'manage') {
                    loadImages();
                }
            });
        });

        // 加载并显示图片列表
        async function loadImages() {
            try {
                const result = await apiRequest('GET', '/images');
                const imagesList = document.getElementById('imagesList');
                imagesList.innerHTML = '';

                const images = result.images || [];

                if (images.length === 0) {
                    imagesList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #8b8f95; padding: 40px 0;">还没有照片</p>';
                    return;
                }

                images.forEach((image) => {
                    const thumbUrl = `${imageBaseUrl}/${image.thumb}`;
                    const filename = image.src.split('/').pop();

                    const card = document.createElement('div');
                    card.className = 'image-card';

                    const thumb = document.createElement('img');
                    thumb.src = thumbUrl;
                    thumb.alt = image.alt || '';
                    thumb.className = 'image-card-thumb';
                    thumb.onerror = () => {
                        thumb.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23ece9e2%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E';
                    };

                    const info = document.createElement('div');
                    info.className = 'image-card-info';

                    const name = document.createElement('div');
                    name.className = 'image-card-name';
                    name.textContent = filename;

                    const alt = document.createElement('div');
                    alt.className = 'image-card-alt';
                    alt.textContent = image.alt || '无说明';

                    const actions = document.createElement('div');
                    actions.className = 'image-card-actions';

                    const copyButton = document.createElement('button');
                    copyButton.className = 'btn-secondary';
                    copyButton.type = 'button';
                    copyButton.textContent = '复制';
                    copyButton.addEventListener('click', () => copyFilename(filename));

                    const deleteButton = document.createElement('button');
                    deleteButton.className = 'btn-danger';
                    deleteButton.type = 'button';
                    deleteButton.textContent = '删除';
                    deleteButton.addEventListener('click', () => deleteImage(filename));

                    actions.append(copyButton, deleteButton);
                    info.append(name, alt, actions);
                    card.append(thumb, info);
                    imagesList.appendChild(card);
                });
            } catch (error) {
                showMessage('manageMessage', `加载失败：${error.message}`, 'error');
            }
        }

        function copyFilename(filename) {
            navigator.clipboard.writeText(filename);
            alert('已复制: ' + filename);
        }

        async function deleteImage(filename) {
            if (!confirm(`确定删除 ${filename} 吗？此操作不可撤销。`)) return;

            try {
                await apiRequest('DELETE', `/images/${filename}`);
                showMessage('manageMessage', '删除成功。', 'success');
                loadImages();
            } catch (error) {
                showMessage('manageMessage', `删除失败：${error.message}`, 'error');
            }
        }

        // 初始化
        window.addEventListener('load', () => {
            loadConfig();
        });
    </script>
</body>
</html>
